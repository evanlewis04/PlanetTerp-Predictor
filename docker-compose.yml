services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: planetterp-predictor-api:local
    ports:
      - "8000:8000"
    environment:
      PLANETTERP_OUTPUT_DIR: outputs
      PLANETTERP_LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data
      - ./experiments:/app/experiments
      - ./outputs:/app/outputs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000
    image: planetterp-predictor-dashboard:local
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
